<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dyrt Series A — Corp Dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♻️</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #1a9e8a;
      --base-background-color: #ffffff;
      --sidebar-background: #f7f8fa;
      --sidebar-border-color: #e8ecf0;
      --sidebar-width: 280px;
      --mono-font: 'SF Mono', 'Fira Code', monospace;
      --base-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-color: #2d3748;
      --heading-color: #1a202c;
      --link-color: #1a9e8a;
      --link-color--hover: #147a6b;
      --code-theme-background: #f0f7f5;
      --code-theme-text: #1a6b5e;
      --selection-color: rgba(26, 158, 138, 0.12);
    }

    body { background: #ffffff; }

    .sidebar { background: #f7f8fa; border-right: 1px solid #e8ecf0; }
    .sidebar .app-name { padding: 20px 16px 8px; border-bottom: 1px solid #e8ecf0; margin-bottom: 8px; }
    .sidebar .app-name-link { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #1a9e8a !important; }
    .sidebar ul li a { font-size: 13px; color: #64748b !important; padding: 3px 0; }
    .sidebar ul li a:hover, .sidebar ul li.active > a { color: #1a9e8a !important; }
    .sidebar ul li em { display: block; font-size: 10px; font-style: normal; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #a0aec0; margin: 12px 0 4px; }

    .content { max-width: 920px; }
    .markdown-section { padding: 32px 40px 80px; }

    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th { background: #f0f7f5; color: #1a6b5e; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 12px; text-align: left; border: 1px solid #e2ebe9; }
    td { padding: 8px 12px; border: 1px solid #edf2f0; vertical-align: top; color: #374151; }
    tr:hover td { background: #f8fffe; }

    h1 { color: #1a202c; border-bottom: 2px solid #1a9e8a; padding-bottom: 10px; font-size: 26px; }
    h2 { color: #2d3748; border-bottom: 1px solid #e8ecf0; padding-bottom: 6px; font-size: 18px; margin-top: 32px; }
    h3 { color: #1a9e8a; font-size: 15px; }

    code { background: #f0f7f5; color: #1a6b5e; border: 1px solid #c8e6e1; border-radius: 3px; padding: 1px 5px; font-size: 12px; }
    pre { background: #f8fffe !important; border: 1px solid #e2ebe9; border-radius: 6px; }
    pre code { background: transparent !important; border: none; color: #2d3748; }

    blockquote { border-left: 3px solid #1a9e8a; background: #f0faf7; margin: 16px 0; padding: 12px 16px; border-radius: 0 6px 6px 0; }
    blockquote p { color: #2d5a52; margin: 0; font-style: italic; font-size: 14px; }

    hr { border: none; border-top: 1px solid #e8ecf0; margin: 24px 0; }
    .task-list-item input[type="checkbox"] { accent-color: #1a9e8a; }
    strong { color: #1a202c; }

    .search { border-bottom: 1px solid #e8ecf0; padding: 8px 12px; }
    .search input { background: #ffffff; border: 1px solid #e8ecf0; border-radius: 6px; color: #2d3748; font-size: 13px; }
    .search input:focus { border-color: #1a9e8a; outline: none; }

    .docsify-copy-code-button { background: #e8ecf0 !important; color: #1a9e8a !important; border: none !important; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f7f8fa; }
    ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1a9e8a; }
    #nprogress .bar { background: #1a9e8a !important; }

    /* ── Lock Screen ── */
    #lock-screen { display: none; position: fixed; inset: 0; z-index: 9999; background: #f7f8fa; align-items: center; justify-content: center; flex-direction: column; }
    #lock-screen.visible { display: flex; }
    #lock-screen .lock-box { background: #ffffff; border: 1px solid #e8ecf0; border-radius: 12px; padding: 44px 52px; text-align: center; max-width: 380px; width: 90%; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    #lock-screen .lock-logo { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #1a9e8a; margin-bottom: 10px; }
    #lock-screen h2 { color: #1a202c; border: none; font-size: 22px; font-weight: 700; margin: 0 0 6px; padding: 0; }
    #lock-screen p { color: #94a3b8; font-size: 13px; margin: 0 0 28px; }
    #lock-screen input { width: 100%; background: #f7f8fa; border: 1px solid #e8ecf0; border-radius: 8px; color: #1a202c; font-size: 16px; padding: 11px 14px; outline: none; box-sizing: border-box; margin-bottom: 12px; letter-spacing: 0.2em; transition: border-color 0.15s; }
    #lock-screen input:focus { border-color: #1a9e8a; background: #ffffff; }
    #lock-screen button { width: 100%; background: #1a9e8a; border: none; border-radius: 8px; color: #ffffff; font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; transition: background 0.15s; }
    #lock-screen button:hover { background: #147a6b; }
    #lock-screen .error { color: #e53e3e; font-size: 12px; margin-top: 10px; display: none; }

    /* ── Activity Panel ── */
    .crm-activity {
      margin: 0 0 28px;
      border: 1px solid #e2ebe9;
      border-radius: 10px;
      overflow: hidden;
      background: #ffffff;
    }

    .crm-activity-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f0faf7;
      border-bottom: 1px solid #e2ebe9;
    }

    .crm-activity-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #1a9e8a;
    }

    .crm-header-btns {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .crm-btn {
      background: #1a9e8a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 13px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .crm-btn:hover:not(:disabled) { background: #147a6b; }
    .crm-btn:disabled { opacity: 0.55; cursor: default; }

    .crm-btn-ghost {
      background: transparent;
      color: #64748b;
      border: 1px solid #e8ecf0;
    }
    .crm-btn-ghost:hover:not(:disabled) { border-color: #1a9e8a; color: #1a9e8a; background: #f0faf7; }

    .crm-empty {
      padding: 18px 16px;
      color: #94a3b8;
      font-size: 13px;
      font-style: italic;
    }

    .crm-note {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f4f3;
    }
    .crm-note:last-child { border-bottom: none; }

    .crm-note-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .crm-note-date {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
    }

    .crm-note-type {
      font-size: 11px;
      background: #f0faf7;
      color: #1a9e8a;
      border: 1px solid #c8e6e1;
      border-radius: 4px;
      padding: 1px 7px;
      font-weight: 600;
    }

    .crm-note-del {
      margin-left: auto;
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 16px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      transition: color 0.15s;
    }
    .crm-note-del:hover { color: #e53e3e; }

    .crm-note-body {
      font-size: 13px;
      color: #1a202c;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .crm-note-next {
      margin-top: 5px;
      font-size: 12px;
      color: #1a9e8a;
      font-weight: 500;
    }

    .crm-status-line {
      padding: 8px 16px;
      background: #fafbfc;
      border-bottom: 1px solid #f0f4f3;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .crm-status-badge {
      background: #e8f4f2;
      color: #1a6b5e;
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .crm-status-badge.overridden {
      background: #1a9e8a;
      color: #fff;
    }

    /* ── Modals ── */
    .crm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(15, 23, 42, 0.28);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .crm-overlay.open { display: flex; }

    .crm-modal {
      background: #ffffff;
      border: 1px solid #e8ecf0;
      border-radius: 12px;
      padding: 26px 28px 22px;
      width: 500px;
      max-width: 100%;
      box-shadow: 0 12px 48px rgba(0,0,0,0.13);
      animation: crm-pop 0.13s ease;
    }
    @keyframes crm-pop { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

    .crm-modal-title { font-size: 16px; font-weight: 700; color: #1a202c; margin: 0 0 16px; }

    .crm-field { margin-bottom: 13px; }
    .crm-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
    .crm-field input, .crm-field select, .crm-field textarea {
      width: 100%; background: #f7f8fa; border: 1px solid #e8ecf0; border-radius: 6px;
      color: #1a202c; font-size: 14px; padding: 9px 11px; outline: none;
      box-sizing: border-box; font-family: inherit; transition: border-color 0.15s, background 0.15s;
    }
    .crm-field textarea { resize: vertical; min-height: 88px; line-height: 1.55; }
    .crm-field input:focus, .crm-field select:focus, .crm-field textarea:focus { border-color: #1a9e8a; background: #fff; }

    .crm-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .crm-modal-footer { display: flex; align-items: center; gap: 8px; justify-content: flex-end; margin-top: 18px; }

    .crm-msg { font-size: 12px; padding: 5px 9px; border-radius: 5px; flex: 1; display: none; }
    .crm-msg.ok  { background: #f0faf7; color: #1a6b5e; display: block; }
    .crm-msg.err { background: #fff5f5; color: #c53030; display: block; }

    /* ── Tracker: Add Investor bar ── */
    .crm-tracker-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 24px;
      padding: 12px 16px;
      background: #f0faf7;
      border: 1px solid #c8e6e1;
      border-radius: 8px;
    }
    .crm-tracker-label {
      font-size: 12px;
      color: #2d5a52;
      font-weight: 500;
    }
    .crm-new-investors {
      margin: 0 0 28px;
      border: 1px solid #e2ebe9;
      border-radius: 10px;
      overflow: hidden;
    }
    .crm-new-investors-header {
      background: #f0faf7;
      border-bottom: 1px solid #e2ebe9;
      padding: 9px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #1a9e8a;
    }
    .crm-new-inv-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f4f3;
      font-size: 13px;
    }
    .crm-new-inv-row:last-child { border-bottom: none; }
    .crm-new-inv-name { font-weight: 600; color: #1a202c; min-width: 140px; }
    .crm-new-inv-firm { color: #64748b; flex: 1; }
    .crm-new-inv-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      background: #f0faf7; color: #1a9e8a; border: 1px solid #c8e6e1;
      border-radius: 4px; padding: 2px 7px; white-space: nowrap;
    }
    .crm-new-inv-del {
      background: none; border: none; color: #cbd5e0; font-size: 18px;
      cursor: pointer; padding: 0 2px; transition: color 0.15s; line-height: 1;
    }
    .crm-new-inv-del:hover { color: #e53e3e; }
  </style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen" class="visible">
  <div class="lock-box">
    <div class="lock-logo">DYRT LABS</div>
    <h2>Series A — Corp Dev</h2>
    <p>Private. Authorized access only.</p>
    <input type="password" id="pin-input" placeholder="Enter passcode" autocomplete="off">
    <button onclick="unlock()">Enter</button>
    <div class="error" id="error-msg">Incorrect passcode. Try again.</div>
  </div>
</div>

<!-- Docsify app -->
<div id="app"></div>

<!-- ── Add Note Modal ── -->
<div id="crm-note-modal" class="crm-overlay" onclick="if(event.target===this)closeModal('crm-note-modal')">
  <div class="crm-modal">
    <div class="crm-modal-title" id="crm-note-title">Add Note</div>
    <div class="crm-field-row">
      <div class="crm-field">
        <label>Date</label>
        <input type="date" id="crm-note-date">
      </div>
      <div class="crm-field">
        <label>Type</label>
        <select id="crm-note-type">
          <option>Call</option>
          <option>Meeting</option>
          <option>Email</option>
          <option>Intro</option>
          <option>Diligence</option>
          <option>Note</option>
        </select>
      </div>
    </div>
    <div class="crm-field">
      <label>Notes</label>
      <textarea id="crm-note-body" placeholder="What happened, what resonated, objections raised, conviction level..."></textarea>
    </div>
    <div class="crm-field">
      <label>Next Step</label>
      <input type="text" id="crm-note-next" placeholder="Send deck / Schedule partner call / Follow up by...">
    </div>
    <div class="crm-modal-footer">
      <span class="crm-msg" id="crm-note-msg"></span>
      <button class="crm-btn crm-btn-ghost" onclick="closeModal('crm-note-modal')">Cancel</button>
      <button class="crm-btn" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<!-- ── Add Investor Modal ── -->
<div id="crm-add-inv-modal" class="crm-overlay" onclick="if(event.target===this)closeModal('crm-add-inv-modal')">
  <div class="crm-modal" style="width:560px">
    <div class="crm-modal-title">Add Investor</div>
    <div class="crm-field-row">
      <div class="crm-field">
        <label>Firm *</label>
        <input type="text" id="ai-firm" placeholder="Breakthrough Energy Ventures">
      </div>
      <div class="crm-field">
        <label>Contact Name</label>
        <input type="text" id="ai-name" placeholder="John Smith">
      </div>
    </div>
    <div class="crm-field-row">
      <div class="crm-field">
        <label>Email</label>
        <input type="email" id="ai-email" placeholder="john@firm.com">
      </div>
      <div class="crm-field">
        <label>Check Size</label>
        <input type="text" id="ai-check" placeholder="$2–5M">
      </div>
    </div>
    <div class="crm-field-row">
      <div class="crm-field">
        <label>Section</label>
        <select id="ai-section">
          <option value="Active Diligence">Active Diligence</option>
          <option value="Tier 1 Leads" selected>Tier 1 Leads</option>
          <option value="NM Track">NM Track</option>
          <option value="Follow-on Pool">Follow-on Pool</option>
        </select>
      </div>
      <div class="crm-field">
        <label>Stage</label>
        <select id="ai-stage">
          <option>Backlog</option>
          <option selected>Outreach</option>

          <option>Meeting</option>

        </select>

    <div class="crm-field">
      <label>Why This Firm / How You Know Them</label>
      <input type="text" id="ai-why" placeholder="Climate VC, met at conference, led Glacier Series A...">
    </div>
    <div class="crm-field">
      <label>First Next Action</label>
      <input type="text" id="ai-next" placeholder="Send cold outreach / Get Ward Hendon intro...">
    </div>
    <div class="crm-modal-footer">
      <span class="crm-msg" id="crm-ai-msg"></span>
      <button class="crm-btn crm-btn-ghost" onclick="closeModal('crm-add-inv-modal')">Cancel</button>
      <button class="crm-btn" onclick="saveNewInvestor()">Add Investor</button>
    </div>
  </div>
</div>

<!-- ── Change Status Modal ── -->
<div id="crm-status-modal" class="crm-overlay" onclick="if(event.target===this)closeModal('crm-status-modal')">
  <div class="crm-modal" style="width:380px">
    <div class="crm-modal-title" id="crm-status-title">Change Status</div>
    <div class="crm-field">
      <label>Stage</label>
      <select id="crm-status-stage">
        <option>Backlog</option>
        <option>Outreach</option>
        <option>Intro</option>
        <option>Meeting</option>
        <option>Diligence</option>
        <option>Term Sheet</option>
        <option>Closed</option>
        <option>Pass</option>
      </select>
    </div>
    <div class="crm-modal-footer">
      <button class="crm-btn crm-btn-ghost" onclick="closeModal('crm-status-modal')">Cancel</button>
      <button class="crm-btn" onclick="saveStatus()">Update</button>
    </div>
  </div>
</div>

<script>
  const PASSCODE    = 'dyrt2026';
  const SESSION_KEY = 'dyrt_crm_auth';

  function unlock() {
    const val = document.getElementById('pin-input').value;
    const err = document.getElementById('error-msg');
    if (val === PASSCODE) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lock-screen').classList.remove('visible');
      err.style.display = 'none';
    } else {
      err.style.display = 'block';
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-input').focus();
    }
  }
  document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lock-screen').classList.remove('visible');
  }
</script>

<script>
  // ── Notes Storage (localStorage) ──────────────────────────────────────────

  const NOTES_STORE = 'dyrt_notes_v1';
  const STATUS_STORE = 'dyrt_status_v1';
  let _fp = null; // current file path

  function getNotesStore()   { try { return JSON.parse(localStorage.getItem(NOTES_STORE) || '{}'); } catch { return {}; } }
  function getStatusStore()  { try { return JSON.parse(localStorage.getItem(STATUS_STORE) || '{}'); } catch { return {}; } }

  function getFirmNotes(fp)  { return (getNotesStore()[fp] || []).slice().reverse(); }
  function getFirmStatus(fp) { return getStatusStore()[fp] || null; }

  function addFirmNote(fp, note) {
    const s = getNotesStore(); s[fp] = (s[fp] || []); s[fp].push(note);
    localStorage.setItem(NOTES_STORE, JSON.stringify(s));
  }
  function delFirmNote(fp, id) {
    const s = getNotesStore(); s[fp] = (s[fp] || []).filter(n => n.id !== id);
    localStorage.setItem(NOTES_STORE, JSON.stringify(s));
  }
  function setFirmStatus(fp, stage) {
    const s = getStatusStore(); s[fp] = { stage, date: today() };
    localStorage.setItem(STATUS_STORE, JSON.stringify(s));
  }

  function today() { return new Date().toISOString().split('T')[0]; }
  function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Activity Panel ─────────────────────────────────────────────────────────

  function buildPanel(fp) {
    const notes    = getFirmNotes(fp);
    const override = getFirmStatus(fp);

    const el = document.createElement('div');
    el.className = 'crm-activity';
    el.id = 'crm-panel';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'crm-activity-header';
    hdr.innerHTML =
      '<span class="crm-activity-title">Activity</span>' +
      '<div class="crm-header-btns">' +
        '<button class="crm-btn crm-btn-ghost" onclick="openStatusModal()">Stage</button>' +
        '<button class="crm-btn" onclick="openNoteModal()">+ Add Note</button>' +
      '</div>';
    el.appendChild(hdr);

    // Status override badge (if set)
    if (override) {
      const sl = document.createElement('div');
      sl.className = 'crm-status-line';
      sl.innerHTML =
        '<span style="color:#64748b;font-size:12px">Stage override:</span>' +
        `<span class="crm-status-badge overridden">${esc(override.stage)}</span>` +
        `<span style="color:#94a3b8;font-size:11px">set ${esc(override.date)}</span>`;
      el.appendChild(sl);
    }

    // Notes list
    if (notes.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'crm-empty';
      empty.textContent = 'No notes yet — click "+ Add Note" to log activity.';
      el.appendChild(empty);
    } else {
      notes.forEach(n => {
        const nd = document.createElement('div');
        nd.className = 'crm-note';
        nd.innerHTML =
          '<div class="crm-note-meta">' +
            `<span class="crm-note-date">${esc(n.date)}</span>` +
            `<span class="crm-note-type">${esc(n.type)}</span>` +
            `<button class="crm-note-del" title="Delete" onclick="deleteNote(${n.id})">×</button>` +
          '</div>' +
          `<div class="crm-note-body">${esc(n.points)}</div>` +
          (n.next ? `<div class="crm-note-next">→ ${esc(n.next)}</div>` : '');
        el.appendChild(nd);
      });
    }

    return el;
  }

  function refreshPanel() {
    if (!_fp) return;
    const old = document.getElementById('crm-panel');
    if (old) old.replaceWith(buildPanel(_fp));
  }

  function deleteNote(id) {
    if (!_fp) return;
    delFirmNote(_fp, id);
    refreshPanel();
  }

  // ── Modal Helpers ──────────────────────────────────────────────────────────

  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function openNoteModal() {
    if (!_fp) return;
    const firm = (document.querySelector('.markdown-section h1') || document.querySelector('#main h1') || {}).textContent || '';
    document.getElementById('crm-note-title').textContent = 'Add Note' + (firm ? ' — ' + firm.split('—')[0].trim() : '');
    document.getElementById('crm-note-date').value = today();
    document.getElementById('crm-note-type').value = 'Call';
    document.getElementById('crm-note-body').value = '';
    document.getElementById('crm-note-next').value = '';
    document.getElementById('crm-note-msg').className = 'crm-msg';
    openModal('crm-note-modal');
    setTimeout(() => document.getElementById('crm-note-body').focus(), 80);
  }

  function saveNote() {
    const points = document.getElementById('crm-note-body').value.trim();
    if (!points) {
      const m = document.getElementById('crm-note-msg');
      m.textContent = 'Enter some notes first.';
      m.className = 'crm-msg err';
      return;
    }
    addFirmNote(_fp, {
      id: Date.now(),
      date: document.getElementById('crm-note-date').value,
      type: document.getElementById('crm-note-type').value,
      points,
      next: document.getElementById('crm-note-next').value.trim()
    });
    closeModal('crm-note-modal');
    refreshPanel();

    // Background GitHub sync if token is available
    const tok = localStorage.getItem('dyrt_gh_pat');
    if (tok && _fp) bgSyncNote(tok, _fp, document.getElementById('crm-note-date').value,
      document.getElementById('crm-note-type').value, points,
      document.getElementById('crm-note-next').value.trim());
  }

  function openStatusModal() {
    if (!_fp) return;
    const firm = (document.querySelector('.markdown-section h1') || document.querySelector('#main h1') || {}).textContent || '';
    document.getElementById('crm-status-title').textContent = 'Change Stage' + (firm ? ' — ' + firm.split('—')[0].trim() : '');

    // Pre-fill with current override or page value
    const override = getFirmStatus(_fp);
    if (override) {
      document.getElementById('crm-status-stage').value = override.stage;
    } else {
      const page = (document.querySelector('.markdown-section') || document.querySelector('#main') || {}).textContent || '';
      const m = page.match(/Status\s*:\s*([A-Za-z ]+)/);
      if (m) {
        const v = m[1].trim().split(' ')[0];
        const sel = document.getElementById('crm-status-stage');
        for (const o of sel.options) if (o.value === v) { sel.value = v; break; }
      }
    }
    openModal('crm-status-modal');
  }

  function saveStatus() {
    const stage = document.getElementById('crm-status-stage').value;
    setFirmStatus(_fp, stage);
    closeModal('crm-status-modal');
    refreshPanel();

    // Background GitHub sync
    const tok = localStorage.getItem('dyrt_gh_pat');
    if (tok && _fp) bgSyncStatus(tok, _fp, stage);
  }

  // ── Background GitHub Sync (optional) ─────────────────────────────────────

  const REPO = 'dyrtylee/dyrt-series-a-crm';

  function b64d(s) { return decodeURIComponent(escape(atob(s.replace(/\n/g,'')))); }
  function b64e(s) { return btoa(unescape(encodeURIComponent(s))); }

  async function ghGet(tok, path) {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,
      { headers: { Authorization: 'token ' + tok, Accept: 'application/vnd.github.v3+json' } });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function ghPut(tok, path, content, sha, msg) {
    const body = { message: msg, content: b64e(content) };
    if (sha) body.sha = sha;
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: 'token ' + tok, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(r.status);
  }

  function appendNoteRow(md, date, type, points, next) {
    const clean = s => (s||'').replace(/\|/g,'–').replace(/\n/g,' ').trim();
    const row = `| ${clean(date)} | ${clean(type)} | ${clean(points)} | ${clean(next)} |`;
    const lines = md.split('\n');
    let last = -1;
    for (let i = lines.length - 1; i >= 0; i--) {
      if (lines[i].trim().startsWith('|')) { last = i; break; }
    }
    if (last === -1) {
      return md.trimEnd() + '\n\n---\n\n## Meeting Notes\n\n| Date | Type | Key Points | Next Step |\n|------|------|-----------|----------|\n' + row + '\n';
    }
    lines.splice(last + 1, 0, row);
    return lines.join('\n');
  }

  function patchStage(md, stage) {
    return md.replace(/(\*\*Status\*\*\s*:\s*)[^\|]+(\s*\|)/, (_, pre, post) => pre + stage + ' ' + post);
  }

  async function bgSyncNote(tok, fp, date, type, points, next) {
    try {
      const d = await ghGet(tok, fp);
      await ghPut(tok, fp, appendNoteRow(b64d(d.content), date, type, points, next), d.sha, 'Note: ' + points.slice(0,60));
    } catch(e) { console.info('GH sync skipped:', e.message); }
  }

  async function bgSyncStatus(tok, fp, stage) {
    try {
      const d = await ghGet(tok, fp);
      await ghPut(tok, fp, patchStage(b64d(d.content), stage), d.sha, 'Status → ' + stage);
    } catch(e) { console.info('GH sync skipped:', e.message); }
  }

  // ── New Investor Storage ───────────────────────────────────────────────────

  const INV_STORE = 'dyrt_investors_v1';

  function getNewInvestors() { try { return JSON.parse(localStorage.getItem(INV_STORE) || '[]'); } catch { return []; } }
  function persistInvestors(list) { localStorage.setItem(INV_STORE, JSON.stringify(list)); }
  function removeNewInvestor(id) { persistInvestors(getNewInvestors().filter(i => i.id !== id)); }

  function toSlug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

  function sectionFolder(sec) {
    if (sec === 'Active Diligence') return 'active-diligence';
    if (sec === 'Tier 1 Leads')     return 'tier1-leads';
    if (sec === 'NM Track')         return 'nm-investors';
    return 'followon';
  }

  function openAddInvestorModal() {
    ['ai-firm','ai-name','ai-email','ai-check','ai-why','ai-next'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('ai-section').value = 'Tier 1 Leads';
    document.getElementById('ai-stage').value = 'Outreach';
    document.getElementById('crm-ai-msg').className = 'crm-msg';
    openModal('crm-add-inv-modal');
    setTimeout(() => document.getElementById('ai-firm').focus(), 80);
  }

  function saveNewInvestor() {
    const firm = document.getElementById('ai-firm').value.trim();
    if (!firm) {
      const m = document.getElementById('crm-ai-msg');
      m.textContent = 'Firm name is required.'; m.className = 'crm-msg err'; return;
    }
    const inv = {
      id:      Date.now(),
      firm,
      name:    document.getElementById('ai-name').value.trim(),
      email:   document.getElementById('ai-email').value.trim(),
      check:   document.getElementById('ai-check').value.trim(),
      section: document.getElementById('ai-section').value,
      stage:   document.getElementById('ai-stage').value,
      why:     document.getElementById('ai-why').value.trim(),
      next:    document.getElementById('ai-next').value.trim(),
      slug:    toSlug(firm),
      added:   today()
    };

    const list = getNewInvestors(); list.push(inv);
    persistInvestors(list);
    closeModal('crm-add-inv-modal');
    refreshTrackerPanel();

    // Background GitHub sync
    const tok = localStorage.getItem('dyrt_gh_pat');
    if (tok) bgSyncNewInvestor(tok, inv);
  }

  function refreshTrackerPanel() {
    const old = document.getElementById('crm-tracker-new');
    if (old) old.remove();
    const section = document.querySelector('.markdown-section') || document.querySelector('#main');
    if (!section) return;
    const bar = document.getElementById('crm-tracker-bar');
    if (bar) bar.insertAdjacentElement('afterend', buildNewInvestorsPanel());
  }

  function buildNewInvestorsPanel() {
    const list = getNewInvestors();
    const wrap = document.createElement('div');
    wrap.id = 'crm-tracker-new';
    if (list.length === 0) return wrap;

    wrap.className = 'crm-new-investors';
    const hdr = document.createElement('div');
    hdr.className = 'crm-new-investors-header';
    hdr.textContent = 'Newly Added (' + list.length + ')';
    wrap.appendChild(hdr);

    list.slice().reverse().forEach(inv => {
      const row = document.createElement('div');
      row.className = 'crm-new-inv-row';
      const folder = sectionFolder(inv.section);
      const profilePath = `#/investors/${folder}/${inv.slug}`;
      row.innerHTML =
        `<span class="crm-new-inv-name">${esc(inv.name || inv.firm)}</span>` +
        `<span class="crm-new-inv-firm"><a href="${profilePath}">${esc(inv.firm)}</a></span>` +
        `<span class="crm-new-inv-badge">${esc(inv.section)}</span>` +
        `<span class="crm-new-inv-badge" style="background:#f7f8fa;color:#64748b;border-color:#e8ecf0">${esc(inv.stage)}</span>` +
        (inv.email ? `<span style="font-size:12px;color:#94a3b8">${esc(inv.email)}</span>` : '') +
        `<button class="crm-new-inv-del" onclick="removeInv(${inv.id})" title="Remove">×</button>`;
      wrap.appendChild(row);
    });

    return wrap;
  }

  function removeInv(id) {
    removeNewInvestor(id);
    refreshTrackerPanel();
  }

  // ── GitHub: sync new investor ──────────────────────────────────────────────

  function buildInvProfileMd(inv) {
    const folder = sectionFolder(inv.section);
    return `# ${inv.firm}

**Status**: ${inv.stage} | **Priority**: 1 | **Lead potential**: Maybe

---

## Contact
- **${inv.name || '—'}** — ${inv.email || 'no email on file'}

## Firm Overview
- Check size: ${inv.check || 'TBD'}
${inv.why ? `- ${inv.why}` : ''}

## Next Action
**${inv.next || 'TBD'}**

---

## Meeting Notes

| Date | Type | Key Points | Next Step |
|------|------|-----------|-----------|
| ${today()} | Note | Added via in-app form | ${inv.next || '—'} |
`;
  }

  function buildInvRow(inv) {
    const folder = sectionFolder(inv.section);
    const link = `[${inv.firm}](investors/${folder}/${inv.slug}.md)`;
    const clean = s => (s||'—').replace(/\|/g,'–');
    if (inv.section === 'Active Diligence')
      return `| 1 | ${clean(inv.name)} | ${link} | ${clean(inv.email)} | ${clean(inv.check)} | Maybe | ${clean(inv.stage)} | ${clean(inv.next)} | ${clean(inv.why)} |`;
    if (inv.section === 'Tier 1 Leads')
      return `| 1 | ${clean(inv.name)} | ${link} | ${clean(inv.email)} | ${clean(inv.check)} | Maybe | ${clean(inv.stage)} | ${clean(inv.next)} |`;
    if (inv.section === 'NM Track')
      return `| 1 | ${clean(inv.name)} | ${link} | ${clean(inv.email)} | ${clean(inv.check)} | — | ${clean(inv.next)} |`;
    return `| 1 | ${clean(inv.name)} | ${link} | ${clean(inv.email)} | ${clean(inv.check)} | ${clean(inv.stage)} | ${clean(inv.next)} |`;
  }

  function insertRowInSection(md, sectionHeader, row) {
    const idx = md.indexOf(sectionHeader);
    if (idx === -1) return md + '\n' + row + '\n';
    const after = md.slice(idx);
    const lines = after.split('\n');
    let lastTable = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].trim().startsWith('|')) lastTable = i;
      else if (lastTable > 0 && lines[i].trim() === '---') break;
    }
    if (lastTable === -1) return md;
    lines.splice(lastTable + 1, 0, row);
    return md.slice(0, idx) + lines.join('\n');
  }

  const SECTION_HEADERS = {
    'Active Diligence': '## Active Diligence',
    'Tier 1 Leads':     '## Tier 1 Lead Targets',
    'NM Track':         '## NM Track',
    'Follow-on Pool':   '## Follow-on Pool'
  };

  async function bgSyncNewInvestor(tok, inv) {
    try {
      const folder  = sectionFolder(inv.section);
      const profPath = `investors/${folder}/${inv.slug}.md`;

      // Create profile page (will fail silently if already exists)
      try {
        const existing = await ghGet(tok, profPath);
        // file exists, skip creation
      } catch {
        await ghPut(tok, profPath, buildInvProfileMd(inv), null, `Add investor: ${inv.firm}`);
      }

      // Add row to README
      const readme = await ghGet(tok, 'investors/README.md');
      const updated = insertRowInSection(b64d(readme.content), SECTION_HEADERS[inv.section] || '## Follow-on Pool', buildInvRow(inv));
      await ghPut(tok, 'investors/README.md', updated, readme.sha, `Add investor: ${inv.firm}`);

    } catch(e) { console.info('GH investor sync skipped:', e.message); }
  }

  // ── Docsify Plugin ─────────────────────────────────────────────────────────

  function crmPlugin(hook, vm) {
    hook.doneEach(function() {
      const path = vm.route.path;

      // ── Master Tracker ──
      if (path === '/investors/README' || path === '/investors/' || path === '/investors') {
        _fp = null;
        const section = document.querySelector('.markdown-section') || document.querySelector('#main');
        if (!section) return;

        if (!document.getElementById('crm-tracker-bar')) {
          const h1 = section.querySelector('h1');
          const bar = document.createElement('div');
          bar.id = 'crm-tracker-bar';
          bar.className = 'crm-tracker-bar';
          bar.innerHTML =
            '<span class="crm-tracker-label">Manage your investor pipeline</span>' +
            '<button class="crm-btn" onclick="openAddInvestorModal()">+ Add Investor</button>';
          if (h1) h1.insertAdjacentElement('afterend', bar);
          else section.prepend(bar);
        }

        const old = document.getElementById('crm-tracker-new');
        if (old) old.remove();
        const bar = document.getElementById('crm-tracker-bar');
        if (bar) bar.insertAdjacentElement('afterend', buildNewInvestorsPanel());
        return;
      }

      // ── Investor profile page ──
      if (!path.match(/^\/investors\/[^/]+\/[^/]+$/)) { _fp = null; return; }

      _fp = path.replace(/^\//, '') + '.md';

      const section = document.querySelector('.markdown-section') || document.querySelector('#main');
      if (!section) return;

      section.querySelectorAll('blockquote').forEach(bq => {
        if (bq.textContent.includes('Edit this page on GitHub')) bq.remove();
      });

      const old = document.getElementById('crm-panel');
      if (old) old.remove();

      const h1 = section.querySelector('h1');
      const panel = buildPanel(_fp);
      if (h1) h1.insertAdjacentElement('afterend', panel);
      else section.prepend(panel);
    });
  }
</script>
