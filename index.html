<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dyrt Series A — Corp Dev</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♻️</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #1a9e8a;
      --base-background-color: #ffffff;
      --sidebar-background: #f7f8fa;
      --sidebar-border-color: #e8ecf0;
      --sidebar-width: 280px;
      --mono-font: 'SF Mono', 'Fira Code', monospace;
      --base-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-color: #2d3748;
      --heading-color: #1a202c;
      --link-color: #1a9e8a;
      --link-color--hover: #147a6b;
      --code-theme-background: #f0f7f5;
      --code-theme-text: #1a6b5e;
      --selection-color: rgba(26, 158, 138, 0.12);
    }

    body { background: #ffffff; }

    /* Sidebar */
    .sidebar {
      background: #f7f8fa;
      border-right: 1px solid #e8ecf0;
    }

    .sidebar .app-name {
      padding: 20px 16px 8px;
      border-bottom: 1px solid #e8ecf0;
      margin-bottom: 8px;
    }

    .sidebar .app-name-link {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a9e8a !important;
    }

    .sidebar ul li a {
      font-size: 13px;
      color: #64748b !important;
      padding: 3px 0;
    }

    .sidebar ul li a:hover,
    .sidebar ul li.active > a {
      color: #1a9e8a !important;
    }

    .sidebar ul li em {
      display: block;
      font-size: 10px;
      font-style: normal;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #a0aec0;
      margin: 12px 0 4px;
    }

    /* Content */
    .content {
      max-width: 920px;
    }

    .markdown-section {
      padding: 32px 40px 80px;
    }

    /* Tables */
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    th {
      background: #f0f7f5;
      color: #1a6b5e;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 9px 12px;
      text-align: left;
      border: 1px solid #e2ebe9;
    }

    td {
      padding: 8px 12px;
      border: 1px solid #edf2f0;
      vertical-align: top;
      color: #374151;
    }

    tr:hover td {
      background: #f8fffe;
    }

    /* Headers */
    h1 {
      color: #1a202c;
      border-bottom: 2px solid #1a9e8a;
      padding-bottom: 10px;
      font-size: 26px;
    }

    h2 {
      color: #2d3748;
      border-bottom: 1px solid #e8ecf0;
      padding-bottom: 6px;
      font-size: 18px;
      margin-top: 32px;
    }

    h3 {
      color: #1a9e8a;
      font-size: 15px;
    }

    /* Inline code */
    code {
      background: #f0f7f5;
      color: #1a6b5e;
      border: 1px solid #c8e6e1;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
    }

    /* Code blocks */
    pre {
      background: #f8fffe !important;
      border: 1px solid #e2ebe9;
      border-radius: 6px;
    }

    pre code {
      background: transparent !important;
      border: none;
      color: #2d3748;
    }

    /* Blockquotes = pitch blurbs */
    blockquote {
      border-left: 3px solid #1a9e8a;
      background: #f0faf7;
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
    }

    blockquote p {
      color: #2d5a52;
      margin: 0;
      font-style: italic;
      font-size: 14px;
    }

    /* HR */
    hr {
      border: none;
      border-top: 1px solid #e8ecf0;
      margin: 24px 0;
    }

    /* Checkboxes */
    .task-list-item input[type="checkbox"] {
      accent-color: #1a9e8a;
    }

    strong { color: #1a202c; }

    /* Search */
    .search {
      border-bottom: 1px solid #e8ecf0;
      padding: 8px 12px;
    }

    .search input {
      background: #ffffff;
      border: 1px solid #e8ecf0;
      border-radius: 6px;
      color: #2d3748;
      font-size: 13px;
    }

    .search input:focus {
      border-color: #1a9e8a;
      outline: none;
    }

    /* Copy button */
    .docsify-copy-code-button {
      background: #e8ecf0 !important;
      color: #1a9e8a !important;
      border: none !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f7f8fa; }
    ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #1a9e8a; }

    /* Progress bar */
    #nprogress .bar { background: #1a9e8a !important; }

    /* Lock screen */
    #lock-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f7f8fa;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lock-screen.visible {
      display: flex;
    }

    #lock-screen .lock-box {
      background: #ffffff;
      border: 1px solid #e8ecf0;
      border-radius: 12px;
      padding: 44px 52px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    #lock-screen .lock-logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a9e8a;
      margin-bottom: 10px;
    }

    #lock-screen h2 {
      color: #1a202c;
      border: none;
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 6px;
      padding: 0;
    }

    #lock-screen p {
      color: #94a3b8;
      font-size: 13px;
      margin: 0 0 28px;
    }

    #lock-screen input {
      width: 100%;
      background: #f7f8fa;
      border: 1px solid #e8ecf0;
      border-radius: 8px;
      color: #1a202c;
      font-size: 16px;
      padding: 11px 14px;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 12px;
      letter-spacing: 0.2em;
      transition: border-color 0.15s;
    }

    #lock-screen input:focus {
      border-color: #1a9e8a;
      background: #ffffff;
    }

    #lock-screen button {
      width: 100%;
      background: #1a9e8a;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }

    #lock-screen button:hover {
      background: #147a6b;
    }

    #lock-screen .error {
      color: #e53e3e;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock-screen" class="visible">
  <div class="lock-box">
    <div class="lock-logo">DYRT LABS</div>
    <h2>Series A — Corp Dev</h2>
    <p>Private. Authorized access only.</p>
    <input type="password" id="pin-input" placeholder="Enter passcode" autocomplete="off">
    <button onclick="unlock()">Enter</button>
    <div class="error" id="error-msg">Incorrect passcode. Try again.</div>
  </div>
</div>

<!-- Docsify app -->
<div id="app"></div>

<script>
  // Simple local passcode — stored in localStorage so you don't re-enter every session
  const PASSCODE = 'dyrt2026';
  const SESSION_KEY = 'dyrt_crm_auth';

  function unlock() {
    const input = document.getElementById('pin-input').value;
    const errEl = document.getElementById('error-msg');
    if (input === PASSCODE) {
      sessionStorage.setItem(SESSION_KEY, '1');
      document.getElementById('lock-screen').classList.remove('visible');
      errEl.style.display = 'none';
    } else {
      errEl.style.display = 'block';
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-input').focus();
    }
  }

  document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') unlock();
  });

  // Check if already authenticated this session
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('lock-screen').classList.remove('visible');
  }
</script>

<script>
  window.$docsify = {
    name: 'DYRT — Series A',
    repo: '',
    loadSidebar: true,
    loadNavbar: false,
    subMaxLevel: 2,
    auto2top: true,
    search: {
      placeholder: 'Search investors, templates...',
      noData: 'No results.',
      depth: 4,
    },
    copyCode: {
      buttonText: 'Copy',
      errorText: 'Error',
      successText: 'Copied',
    },
    tabs: {
      persist: true,
      sync: true,
    },
    themeColor: '#3fcfb4',
    routerMode: 'hash',
    notFoundPage: true,
    pagination: {
      previousText: 'Previous',
      nextText: 'Next',
      crossChapter: true,
    },
  };
</script>

<!-- Docsify core -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<!-- Plugins -->
<script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
